  /* logo / exit */

  /* arrival title */
  #arr{position:fixed;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;opacity:0;pointer-events:none;transition:opacity .5s}

  #arr .ak{font-size:.7rem;letter-spacing:.36em;text-transform:uppercase;color:#b7b1a8}
  #arr .an{font-size:clamp(2.4rem,7vw,5rem);font-weight:800;letter-spacing:-.02em;line-height:.95}
  #arr .sub{font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:#8f8a82;margin-top:.6rem}

  /* ===== MOBILE HUB (4 chenare egale, shadere 3D reale, fara Three.js) ===== */
  #mob{display:none}
  html.mob .cap, html.mob .hint, html.mob .lab, html.mob #arr{display:none!important}
  html.mob .logo{top:1.05rem;left:1.15rem}
  html.mob #mob{display:block;position:fixed;inset:0;z-index:12;pointer-events:none}
  html.mob #mob .mh{position:absolute;left:0;right:0;top:1.4rem;font-weight:800;font-size:1.5rem;letter-spacing:-.012em;text-align:center;color:#ede9e3}
  html.mob #mob .ms{position:absolute;left:0;right:0;top:3.4rem;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:#7a7570;text-align:center}
  html.mob #mob .mgrid{position:absolute;left:0;right:0;top:5rem;bottom:.9rem;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:.65rem;padding:0 .75rem;pointer-events:auto}
  html.mob .mtile{position:relative;border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;background:#050505;text-decoration:none;transition:transform .15s,border-color .2s}
  html.mob .mtile:active{transform:scale(.985);border-color:var(--c)}
  html.mob .mtile canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  html.mob .mtile .tl{position:absolute;left:0;right:0;bottom:0;padding:.7rem .8rem;display:flex;flex-direction:column;gap:.1rem;background:linear-gradient(0deg,rgba(5,5,5,.88),rgba(5,5,5,.4) 60%,transparent)}
  html.mob .mtile .tk{font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:#9a948c}
  html.mob .mtile .tn{font-weight:800;font-size:1.22rem;letter-spacing:-.01em;color:var(--c)}

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
if(!window.__MOB){
const THREE = await import('three');
const {EffectComposer} = await import('three/addons/postprocessing/EffectComposer.js');
const {RenderPass} = await import('three/addons/postprocessing/RenderPass.js');
const {UnrealBloomPass} = await import('three/addons/postprocessing/UnrealBloomPass.js');

/* ---------- shared GLSL ---------- */
const NOISE=`
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise(vec3 x){vec3 i=floor(x),f=fract(x);f=f*f*(3.0-2.0*f);
 return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
            mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
float fbm(vec3 p){float s=0.0,a=0.5;for(int i=0;i<5;i++){s+=a*noise(p);p*=2.12;a*=0.5;}return s;}`;
const TEMP=`
vec3 temp(float t){vec3 a=vec3(1.0,0.40,0.10),b=vec3(1.0,0.78,0.34),c=vec3(1.0,0.97,0.92);
 return t<0.5?mix(a,b,t*2.0):mix(b,c,(t-0.5)*2.0);}`;
const VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;

/* ---------- bodies ---------- */
// WEBSITES = galaxie
const FRAG_GX=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uHover;uniform float uFade;
${NOISE}
void main(){
 vec2 uv=(vUv-0.5)*3.2;
 vec2 p=vec2(uv.x,uv.y/0.48)*1.55;
 float r=length(p), ang=atan(p.y,p.x), t=uTime*0.05;
 float sp=cos(ang*2.0 - log(r+0.08)*6.0 + t*6.0);
 float arm=pow(0.5+0.5*sp,3.3);
 float gas=fbm(vec3(p*1.7,t));
 float dens=arm*(0.35+1.0*gas);
 dens*=smoothstep(3.0,0.15,r);
 dens*=(0.32+0.7/(1.0+r*r*2.8));
 float core=exp(-r*r*12.0);
 vec3 cCore=vec3(1.0,0.82,0.50), cMid=vec3(0.0,0.90,0.80), cEdge=vec3(0.50,0.38,1.0);
 vec3 colr = r<0.55 ? mix(cCore,cMid,r/0.55) : mix(cMid,cEdge,clamp((r-0.55)/1.4,0.0,1.0));
 vec3 col = colr*dens*1.5 + cCore*core*1.15;
 col *= 0.55+0.55*smoothstep(0.15,0.65,fbm(vec3(p*3.2+9.0,t*0.4)));
 col += cMid*0.06*smoothstep(2.2,0.0,r)*gas;
 col *= 1.0+uHover*0.45;
 float a = smoothstep(1.62,0.18,length(uv));
 gl_FragColor=vec4(col*a*uFade, 1.0);
}`;

// DESIGN = supernova
const FRAG_SN=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uHover;uniform float uFade;
${NOISE}${TEMP}
void main(){
 vec2 uv=(vUv-0.5)*2.4;
 float r=length(uv);
 float pulse=0.93+0.07*sin(uTime*1.4)+0.02*sin(uTime*3.7);
 float Rs=0.30*pulse;
 vec3 col=vec3(0.0);
 if(r<Rs){
  float z=sqrt(max(Rs*Rs-r*r,0.0));
  vec3 n=normalize(vec3(uv,z));
  float pl=fbm(n*3.6+vec3(uTime*0.22,uTime*0.1,-uTime*0.15));
  pl=pow(clamp(pl+0.28,0.0,1.0),1.4);
  float fres=pow(1.0-z/Rs,1.6);
  col=temp(pl)*(0.62+pl*0.62)+temp(1.0)*fres*0.38;
 } else {
  float fall=Rs/r, ang=atan(uv.y,uv.x);
  float fil=fbm(vec3(cos(ang)*3.0,sin(ang)*3.0,uTime*0.13));
  float rays=pow(0.5+0.5*sin(ang*13.0+fil*7.0),3.0);
  float glow=pow(fall,2.1)*(0.55+0.7*fil)+pow(fall,3.6)*rays*0.8;
  col=temp(0.32)*glow;
  col+=vec3(0.0,0.55,0.5)*pow(fall,1.25)*pow(fil,3.2)*0.5;
 }
 float sw=mod(uTime*0.16,1.0);
 float ringR=0.34+sw*1.15;
 col+=temp(0.65)*smoothstep(0.05,0.0,abs(r-ringR))*(1.0-sw)*0.45;
 col *= 1.0+uHover*0.45;
 float a = smoothstep(1.18,0.16,r);
 gl_FragColor=vec4(col*a*uFade, 1.0);
}`;

// VIDEO = gaura neagra (patch deep-space cu void real)
const FRAG_BH=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uHover;uniform float uFade;
${NOISE}${TEMP}
vec3 starfield(vec3 d){
 vec3 col=vec3(0.0);
 float n=hash(floor(d*260.0));
 if(n>0.987){float b=(n-0.987)/0.013;col+=vec3(b*b)*(0.4+0.6*hash(floor(d*131.0)+7.7));}
 float nb=fbm(d*2.4+vec3(0.0,0.0,uTime*0.01));
 col+=mix(vec3(0.0,0.045,0.05),vec3(0.05,0.015,0.09),nb)*0.55;
 col+=vec3(0.0,0.20,0.18)*pow(nb,3.0)*0.5;
 return col;
}
void main(){
 vec2 uv=(vUv-0.5)*2.0; vec2 uvz=uv*0.58;
 float my=0.30, mx=uTime*0.06;
 float cd=17.0;
 vec3 ro=vec3(sin(mx)*cos(my),sin(my),cos(mx)*cos(my))*cd;
 vec3 f=normalize(-ro), rr=normalize(cross(vec3(0.0,1.0,0.0),f)), u=cross(f,rr);
 vec3 rd=normalize(uvz.x*rr+uvz.y*u+1.5*f);
 vec3 pos=ro, vel=rd;
 float HOR=0.62; float dacc=0.0; vec3 dcol=vec3(0.0); bool hit=false;
 for(int i=0;i<88;i++){
  float r2=dot(pos,pos); float dist=sqrt(r2);
  if(dist<HOR){hit=true;break;}
  vec3 g=-pos/(r2*dist)*0.42; vel=normalize(vel+g);
  float st=0.10+dist*0.022; vec3 np=pos+vel*st;
  if(pos.y*np.y<0.0){
   float tt=pos.y/(pos.y-np.y); vec3 hp=mix(pos,np,tt); float rad=length(hp.xz);
   float rin=HOR*1.6, rout=4.2;
   if(rad>rin&&rad<rout){
    float tn=1.0-clamp((rad-rin)/(rout-rin),0.0,1.0);
    float ang=atan(hp.z,hp.x);
    float tb=fbm(vec3(rad*2.4,ang*3.0+uTime*0.7,uTime*0.25));
    tb=tb*0.6+0.4*fbm(vec3(rad*6.4,ang*7.5-uTime*1.25,uTime*0.55));
    float br=(0.18+1.45*tb)*(0.5+0.5*sin(ang*1.0-uTime*0.8));
    float dop=0.55+0.7*clamp(dot(normalize(vec3(-hp.z,0.0,hp.x)),vel),0.0,1.0);
    dcol+=temp(tn)*br*dop*(0.95+tn*3.0)*(1.0-dacc); dacc+=0.85*(1.0-dacc);
   }
  }
  pos=np; if(dacc>0.97)break;
 }
 vec3 bg = hit ? vec3(0.0) : starfield(normalize(vel));
 vec3 col = bg + dcol*1.5*(1.0+uHover*0.45);
 float fe=smoothstep(1.06,0.5,length(uv));
 gl_FragColor=vec4(col, fe*uFade);
}`;

// REZULTATE = wormhole (portal catre case studies pe client)
const FRAG_WH=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uHover;uniform float uFade;
${NOISE}
void main(){
 vec2 uv=(vUv-0.5)*2.0;
 float r=length(uv), ang=atan(uv.y,uv.x), t=uTime;
 float spiral=sin(ang*3.0 + log(r+0.05)*7.0 - t*2.2);
 float arms=pow(0.5+0.5*spiral,2.2);
 float rings=0.5+0.5*sin((1.0/(r+0.10))*4.5 + t*2.2);
 float tex=fbm(vec3(uv*3.2,t*0.3));
 float body=arms*(0.40+0.75*rings)*(0.45+0.8*tex);
 body*=smoothstep(0.98,0.08,r);
 float rim=exp(-pow((r-0.17)*8.5,2.0));
 float mouth=smoothstep(0.17,0.0,r);
 vec3 cIn=vec3(0.0,0.92,0.82), cOut=vec3(0.52,0.36,1.0);
 vec3 col=mix(cIn,cOut,clamp(r*1.2,0.0,1.0))*body;
 col+=vec3(0.5,0.95,1.0)*rim*1.25;
 col*=(1.0-mouth*0.8);
 col*=1.0+uHover*0.5;
 float a2=smoothstep(1.02,0.1,r);
 gl_FragColor=vec4(col*a2*uFade,1.0);
}`;

const FRAG_NEB=`precision highp float;varying vec3 vDir;uniform float uTime;
${NOISE}
void main(){
 vec3 d=normalize(vDir);
 float neb=fbm(d*2.2+vec3(0.0,0.0,uTime*0.01));
 vec3 col=mix(vec3(0.010,0.013,0.022),vec3(0.045,0.022,0.075),neb);
 col+=vec3(0.0,0.17,0.16)*pow(neb,3.0)*0.45;
 col+=vec3(0.11,0.05,0.17)*pow(fbm(d*1.3+5.0),4.0)*0.40;
 float st=hash(floor(d*430.0));
 if(st>0.9915){float b=(st-0.9915)/0.0085;col+=vec3(b)*(0.5+0.5*hash(floor(d*211.0)+3.3));}
 gl_FragColor=vec4(col,1.0);
}`;

/* ---------- setup ---------- */
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;

const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,200);
const HOME=new THREE.Vector3(0,0,16);
cam.position.copy(HOME);

/* nebula bg */
const neb=new THREE.Mesh(
  new THREE.SphereGeometry(70,32,32),
  new THREE.ShaderMaterial({
    uniforms:{uTime:{value:0}},
    vertexShader:`varying vec3 vDir;void main(){vDir=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:FRAG_NEB,side:THREE.BackSide,depthWrite:false,depthTest:false}));
neb.renderOrder=-10; scene.add(neb);

/* bodies */
const group=new THREE.Group(); scene.add(group);
function makeBody(frag,size,pos,blend,ro){
  const u={uTime:{value:0},uHover:{value:0},uFade:{value:1}};
  const m=new THREE.Mesh(new THREE.PlaneGeometry(size,size),
    new THREE.ShaderMaterial({uniforms:u,vertexShader:VERT,fragmentShader:frag,
      transparent:true,blending:blend||THREE.AdditiveBlending,depthWrite:false,depthTest:false}));
  m.position.set(pos.x,pos.y,pos.z); m.renderOrder=ro||0; group.add(m); return m;
}
const BODIES=[
  {key:'video',    name:'Video',    label:'film & motion',  color:'#ff9650', href:'/portofoliu/video.html',
   rad:3.3, mesh:makeBody(FRAG_BH,6,{x:-7.5,y:4.2,z:0},THREE.NormalBlending,0)},
  {key:'design',   name:'Design',   label:'lumina & forma', color:'#ffce80', href:'/portofoliu/design.html',
   rad:3.3, mesh:makeBody(FRAG_SN,5.8,{x:7.5,y:4.2,z:0},THREE.AdditiveBlending,1)},
  {key:'websites', name:'Websites', label:'lumi construite',color:'#00e0c0', href:'/portofoliu/websites.html',
   rad:3.3, mesh:makeBody(FRAG_GX,7,{x:0,y:4.2,z:0},THREE.AdditiveBlending,1)},
  {key:'rezultate', name:'Rezultate', label:'povești de client', color:'#a78bff', href:'/portofoliu/rezultate.html',
   rad:3.0, mesh:makeBody(FRAG_WH,7,{x:0,y:-3.4,z:0},THREE.AdditiveBlending,1)}
];

/* labels (HTML, projected) */
BODIES.forEach(b=>{
  const el=document.createElement('div'); el.className='lab';
  el.style.color=b.color;
  el.innerHTML=`<div class="k">${b.label}</div><div class="n">${b.name}</div><span class="ln"></span>`;
  document.body.appendChild(el); b.el=el;
});

/* bloom */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,cam));
const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.95,0.5,0.6);
composer.addPass(bloom);

/* interaction */
const ray=new THREE.Raycaster();
const ndc=new THREE.Vector2(-2,-2);
let tmx=0,tmy=0,mx=0,my=0,hovered=null;
addEventListener('mousemove',e=>{
  ndc.x=e.clientX/innerWidth*2-1; ndc.y=-(e.clientY/innerHeight*2-1);
  tmx=ndc.x; tmy=ndc.y;
  document.getElementById('hint').classList.add('gone');
});
addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});

/* fly-in state machine */
let state='idle';            // idle | flying | arrived | returning
let target=null, tprog=0;
const camPos=new THREE.Vector3().copy(HOME);
const lookAt=new THREE.Vector3(0,0,0);
const arr=document.getElementById('arr');
const C0=new THREE.Vector2(0.5,0.5);

function pickTarget(){
  ray.setFromCamera(ndc,cam);
  const hits=ray.intersectObjects(BODIES.map(b=>b.mesh),false);
  for(const h of hits){
    if(h.uv && h.uv.distanceTo(C0)<0.46) return BODIES.find(b=>b.mesh===h.object);
  }
  return null;
}
canvas.addEventListener('click',(e)=>{
  if(state!=='idle') return;
  ndc.x=e.clientX/innerWidth*2-1; ndc.y=-(e.clientY/innerHeight*2-1);
  const b=pickTarget(); if(!b) return;
  target=b; state='flying'; tprog=0;
  arr.querySelector('.ak').textContent=b.label;
  arr.querySelector('.an').textContent=b.name;
  arr.querySelector('.an').style.color=b.color;
  setTimeout(()=>arr.classList.add('show'),650);
  setTimeout(()=>{location.href=b.href;},1450);
});

const tmpV=new THREE.Vector3(), cV=new THREE.Vector3(), eV=new THREE.Vector3();
const clock=new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  try{
  const t=clock.getElapsedTime();
  neb.material.uniforms.uTime.value=t;

  // parallax
  mx+=(tmx-mx)*0.045; my+=(tmy-my)*0.045;
  group.rotation.y=mx*0.10; group.rotation.x=-my*0.08;

  // hover (idle only)
  let hot=false;
  if(state==='idle'){ hovered=pickTarget(); if(hovered) hot=true; } else hovered=null;
  canvas.classList.toggle('hot',hot);

  BODIES.forEach(b=>{
    const u=b.mesh.material.uniforms;
    u.uTime.value=t;
    u.uHover.value+=((hovered===b?1:0)-u.uHover.value)*0.12;
    let wantF=1;
    if(state==='flying'||state==='arrived') wantF=(b===target)?1:Math.max(0,1-tprog*1.6);
    if(state==='returning')                 wantF=(b===target)?1:Math.min(1,tprog);
    u.uFade.value+=(wantF-u.uFade.value)*0.15;

    b.mesh.getWorldPosition(tmpV);
    cV.copy(tmpV).project(cam);
    eV.copy(tmpV); eV.y-=b.rad; eV.project(cam);
    const sx=(cV.x*0.5+0.5)*innerWidth;
    const syEdge=(-eV.y*0.5+0.5)*innerHeight;
    const vis=cV.z<1 && state==='idle';
    b.el.style.left=sx+'px';
    b.el.style.top=(syEdge+28)+'px';
    b.el.style.opacity=vis?'':'0';
    b.el.classList.toggle('on',hovered===b && state==='idle');
  });

  // camera animation
  if(state==='flying'){
    tprog=Math.min(1,tprog+0.018);
    const e=tprog*tprog*(3-2*tprog);
    target.mesh.getWorldPosition(tmpV);
    const dest=tmpV.clone().add(HOME.clone().sub(tmpV).normalize().multiplyScalar(4.2));
    camPos.copy(HOME).lerp(dest,e);
    lookAt.set(0,0,0).lerp(tmpV,e);
    if(tprog>=1){ state='arrived'; }
  } else if(state==='returning'){
    tprog=Math.min(1,tprog+0.022);
    const e=tprog*tprog*(3-2*tprog);
    target.mesh.getWorldPosition(tmpV);
    const dest=tmpV.clone().add(HOME.clone().sub(tmpV).normalize().multiplyScalar(4.2));
    camPos.copy(dest).lerp(HOME,e);
    lookAt.copy(tmpV).lerp(new THREE.Vector3(0,0,0),e);
    if(tprog>=1){ state='idle'; target=null; }
  }
  cam.position.copy(camPos); cam.lookAt(lookAt);

  composer.render();
  }catch(err){window.__loopErr=(window.__loopErr||'')+' '+err.message;}
}
