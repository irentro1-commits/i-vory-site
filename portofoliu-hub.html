<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Portofoliu i-vory Studio — prototip hub 3D</title>
<style>
  :root{--bg:#050505;--ac:#00e0c0;--gold:#ffb86b;--tm:#8a857e;--fd:'Geist',-apple-system,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:var(--fd);color:#fff}
  #scene{position:fixed;inset:0;z-index:1;display:block}
  /* loader */
  #ld{position:fixed;inset:0;z-index:50;background:#050505;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.4rem;transition:opacity .8s ease}
  #ld.out{opacity:0;pointer-events:none}
  .ld-ring{width:54px;height:54px;border-radius:50%;border:2px solid rgba(0,224,192,.15);border-top-color:var(--ac);animation:spin 1s linear infinite;box-shadow:0 0 30px rgba(0,224,192,.3)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ld-txt{font-size:.74rem;letter-spacing:.34em;text-transform:uppercase;color:var(--tm)}
  /* top bar */
  .top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 2rem;pointer-events:none}
  .logo{pointer-events:auto;display:flex;align-items:center;gap:.5rem;text-decoration:none;color:#fff;font-family:var(--fd);font-weight:800;font-size:1.1rem;letter-spacing:-.02em}
  .logo b{color:var(--ac)}
  .logo span{font-size:.7rem;color:var(--tm);font-weight:500;letter-spacing:.05em}
  .hint{pointer-events:none;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--tm);opacity:.7}
  /* intro heading */
  .intro{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;text-align:center;pointer-events:none;transition:opacity .6s ease;width:90%;max-width:640px}
  .intro.gone{opacity:0}
  .intro h1{font-size:clamp(1.8rem,5vw,3.4rem);font-weight:800;letter-spacing:-.03em;line-height:1.05}
  .intro h1 i{font-style:normal;color:var(--ac)}
  .intro p{margin-top:.9rem;font-size:.9rem;color:var(--tm);letter-spacing:.02em}
  /* 3D labels */
  .lbl{position:fixed;z-index:18;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .35s ease,letter-spacing .35s ease}
  .lbl .n{display:block;font-weight:800;font-size:1.05rem;letter-spacing:.04em}
  .lbl .s{display:block;font-size:.66rem;color:var(--tm);letter-spacing:.18em;text-transform:uppercase;margin-top:.2rem}
  .lbl.dim{opacity:.45}
  .lbl.hot{opacity:1;letter-spacing:.08em}
  /* back btn */
  .back{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);z-index:20;pointer-events:auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#fff;font-family:var(--fd);font-size:.78rem;padding:.6rem 1.4rem;border-radius:100px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .4s ease;backdrop-filter:blur(6px)}
  .back.show{opacity:1;pointer-events:auto}
  canvas{cursor:none}
</style>
</head>
<body>
<div id="ld"><div class="ld-ring"></div><div class="ld-txt">Se deschide universul</div></div>

<div class="top">
  <a class="logo" href="/" title="Înapoi acasă">i&#8209;vory <span>Studio</span></a>
  <div class="hint">Alege un univers</div>
</div>

<div class="intro" id="intro">
  <h1>Trei lumi. <i>Aceeași echipă.</i></h1>
  <p>Apasă pe un corp ceresc ca să intri în portofoliu.</p>
</div>

<canvas id="scene"></canvas>
<button class="back" id="back">&larr; Înapoi la univers</button>

<div class="lbl" data-b="websites"><span class="n">Websites</span><span class="s">Planete construite</span></div>
<div class="lbl" data-b="video"><span class="n">Video</span><span class="s">Atrage privirea</span></div>
<div class="lbl" data-b="design"><span class="n">Design</span><span class="s">Lumină &amp; formă</span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";
var IS_MOBILE = window.matchMedia("(max-width:768px)").matches || ("ontouchstart" in window && window.innerWidth<=768);
var REDUCED = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

var canvas=document.getElementById('scene');
var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:!IS_MOBILE,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,IS_MOBILE?1.5:2));
var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x050505,0.013);
var camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,300);
camera.position.set(0,0,46);

// ---- generated glow sprite texture (no external assets) ----
function glowTex(r,g,b){
  var c=document.createElement('canvas');c.width=c.height=64;var x=c.getContext('2d');
  var grd=x.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,'rgba('+r+','+g+','+b+',1)');
  grd.addColorStop(.25,'rgba('+r+','+g+','+b+',.6)');
  grd.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
  x.fillStyle=grd;x.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
var dustTex=glowTex(255,255,255);

// ---- nebula dust ----
var COUNT=IS_MOBILE?900:2600;
var pos=new Float32Array(COUNT*3), col=new Float32Array(COUNT*3);
var palette=[[0,224,192],[123,90,255],[255,184,107],[255,255,255]];
for(var i=0;i<COUNT;i++){
  var rr=18+Math.pow(Math.random(),.6)*70;
  var th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
  pos[i*3]=Math.sin(ph)*Math.cos(th)*rr;
  pos[i*3+1]=(Math.cos(ph)*rr)*0.55;
  pos[i*3+2]=Math.sin(ph)*Math.sin(th)*rr - 10;
  var p=palette[Math.random()<.5?3:(Math.random()*3|0)];
  var f=.4+Math.random()*.6;
  col[i*3]=p[0]/255*f;col[i*3+1]=p[1]/255*f;col[i*3+2]=p[2]/255*f;
}
var pg=new THREE.BufferGeometry();
pg.setAttribute('position',new THREE.BufferAttribute(pos,3));
pg.setAttribute('color',new THREE.BufferAttribute(col,3));
var dust=new THREE.Points(pg,new THREE.PointsMaterial({size:IS_MOBILE?1.1:0.9,map:dustTex,vertexColors:true,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.9}));
scene.add(dust);

// ---- group holding the 3 worlds ----
var worlds=new THREE.Group();scene.add(worlds);
var SPOTS={websites:new THREE.Vector3(-20,3,0),video:new THREE.Vector3(20,-2,-4),design:new THREE.Vector3(0,14,-6)};
var objects=[]; // {key,mesh,hit,pivot}

function addGlow(parent,color,size,op){
  var s=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex(color[0],color[1],color[2]),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:op||.8}));
  s.scale.set(size,size,1);parent.add(s);return s;
}
function hitSphere(pivot,key,r){
  var h=new THREE.Mesh(new THREE.SphereGeometry(r,8,8),new THREE.MeshBasicMaterial({visible:false}));
  h.userData.key=key;pivot.add(h);return h;
}

// 1) PLANET = websites
(function(){
  var pv=new THREE.Group();pv.position.copy(SPOTS.websites);worlds.add(pv);
  var sphere=new THREE.Mesh(new THREE.IcosahedronGeometry(5,1),new THREE.MeshBasicMaterial({color:0x00e0c0,wireframe:true,transparent:true,opacity:.85}));
  var core=new THREE.Mesh(new THREE.SphereGeometry(4.6,24,24),new THREE.MeshBasicMaterial({color:0x021a18}));
  var ring=new THREE.Mesh(new THREE.TorusGeometry(7.6,.12,8,80),new THREE.MeshBasicMaterial({color:0x7dffe6,transparent:true,opacity:.55}));
  ring.rotation.x=Math.PI*0.46;ring.rotation.y=.3;
  pv.add(core,sphere,ring);addGlow(pv,[0,224,192],26,.5);
  objects.push({key:'websites',pivot:pv,spin:sphere,ring:ring,hit:hitSphere(pv,'websites',8)});
})();

// 2) BLACK HOLE = video
(function(){
  var pv=new THREE.Group();pv.position.copy(SPOTS.video);worlds.add(pv);
  var hole=new THREE.Mesh(new THREE.SphereGeometry(3.2,32,32),new THREE.MeshBasicMaterial({color:0x000000}));
  // accretion disk via canvas gradient texture
  var c=document.createElement('canvas');c.width=c.height=256;var g=c.getContext('2d');
  var grd=g.createRadialGradient(128,128,40,128,128,128);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(.45,'rgba(255,150,80,.95)');
  grd.addColorStop(.7,'rgba(180,90,255,.6)');grd.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grd;g.beginPath();g.arc(128,128,128,0,7);g.fill();
  var diskTex=new THREE.CanvasTexture(c);
  var disk=new THREE.Mesh(new THREE.RingGeometry(3.6,9,64),new THREE.MeshBasicMaterial({map:diskTex,transparent:true,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.95}));
  disk.rotation.x=Math.PI*0.5;disk.rotation.y=-.35;
  var disk2=disk.clone();disk2.rotation.x=Math.PI*0.5;disk2.rotation.z=.5;disk2.material=disk.material;
  pv.add(disk,disk2,hole);addGlow(pv,[200,120,255],22,.35);
  objects.push({key:'video',pivot:pv,disk:disk,disk2:disk2,hit:hitSphere(pv,'video',9)});
})();

// 3) SUPERNOVA = design
(function(){
  var pv=new THREE.Group();pv.position.copy(SPOTS.design);worlds.add(pv);
  var star=new THREE.Mesh(new THREE.SphereGeometry(2.2,24,24),new THREE.MeshBasicMaterial({color:0xfff2d6}));
  var halo=addGlow(pv,[255,200,120],30,.7);
  var halo2=addGlow(pv,[255,255,255],12,.9);
  // rays
  var rays=new THREE.Group();
  var rg=new THREE.PlaneGeometry(.5,16);
  for(var k=0;k<10;k++){var ry=new THREE.Mesh(rg,new THREE.MeshBasicMaterial({color:0xffd9a0,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false}));ry.rotation.z=k/10*Math.PI*2;rays.add(ry);}
  pv.add(rays,star);
  objects.push({key:'design',pivot:pv,star:star,halo:halo,halo2:halo2,rays:rays,hit:hitSphere(pv,'design',8)});
})();

// ---- labels ----
var labels={};document.querySelectorAll('.lbl').forEach(function(el){labels[el.dataset.b]=el;});
var v3=new THREE.Vector3();
function projectLabels(){
  objects.forEach(function(o){
    o.pivot.getWorldPosition(v3);v3.y+= (o.key==='design'?6:7);
    v3.project(camera);
    var el=labels[o.key];
    var inFront=v3.z<1;
    var x=(v3.x*0.5+0.5)*innerWidth, y=(-v3.y*0.5+0.5)*innerHeight;
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.display=inFront&&!flying?'block':'none';
  });
}

// ---- raycast hover/click ----
var ray=new THREE.Raycaster(),mouse=new THREE.Vector2(-9,-9),hovered=null;
var hits=objects.map(function(o){return o.hit;});
function pick(){
  ray.setFromCamera(mouse,camera);var r=ray.intersectObjects(hits,false);
  return r.length?r[0].object.userData.key:null;
}
addEventListener('mousemove',function(e){mouse.x=e.clientX/innerWidth*2-1;mouse.y=-(e.clientY/innerHeight*2)+1;targetPar.x=mouse.x;targetPar.y=mouse.y;});

// ---- custom cursor dot ----
var cur=document.createElement('div');
cur.style.cssText='position:fixed;z-index:40;width:10px;height:10px;border:1.5px solid rgba(0,224,192,.9);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;box-shadow:0 0 12px rgba(0,224,192,.6)';
document.body.appendChild(cur);
addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

// ---- camera fly ----
var flying=false,flyT=0,flyFrom=new THREE.Vector3(),flyTo=new THREE.Vector3(),lookFrom=new THREE.Vector3(),lookTo=new THREE.Vector3(),curLook=new THREE.Vector3(0,0,0),homeCam=new THREE.Vector3(0,0,46);
var backBtn=document.getElementById('back'),intro=document.getElementById('intro');
function easeIO(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function flyTo3(key){
  var o=objects.find(function(x){return x.key===key;});if(!o)return;
  var wp=new THREE.Vector3();o.pivot.getWorldPosition(wp);
  flyFrom.copy(camera.position);
  flyTo.copy(wp).add(new THREE.Vector3(0,1.5,16));
  lookFrom.copy(curLook);lookTo.copy(wp);
  flyT=0;flying=true;intro.classList.add('gone');
  console.log('branch:'+key); // <-- aici se va lega navigarea reala spre /portofoliu/<key>
}
function flyHome(){
  flyFrom.copy(camera.position);flyTo.copy(homeCam);
  lookFrom.copy(curLook);lookTo.set(0,0,0);
  flyT=0;flying=true;backBtn.classList.remove('show');
}
addEventListener('click',function(e){
  if(e.target.closest('.logo')||e.target===backBtn)return;
  if(backBtn.classList.contains('show')){flyHome();return;}
  var k=pick();if(k){flyTo3(k);}
});
backBtn.addEventListener('click',flyHome);

// ---- parallax ----
var par={x:0,y:0},targetPar={x:0,y:0};

// ---- resize ----
addEventListener('resize',function(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});

// ---- loop ----
var clock=new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  var t=clock.getElapsedTime(),dt=clock.getDelta?0:0;
  if(!REDUCED){
    dust.rotation.y=t*0.015;
    worlds.children.forEach(function(p,i){p.position.y+=Math.sin(t*0.6+i*2)*0.004;});
    objects.forEach(function(o){
      if(o.spin)o.spin.rotation.y+=0.004;
      if(o.ring)o.ring.rotation.z+=0.003;
      if(o.disk){o.disk.rotation.z+=0.02;o.disk2.rotation.z-=0.015;}
      if(o.star){var s=1+Math.sin(t*2)*0.08;o.star.scale.setScalar(s);o.halo.scale.setScalar(30+Math.sin(t*2)*4);o.rays.rotation.z=t*0.1;}
    });
  }
  // hover
  if(!flying){
    var k=pick();
    if(k!==hovered){
      hovered=k;
      cur.style.width=k?'26px':'10px';cur.style.height=k?'26px':'10px';cur.style.background=k?'rgba(0,224,192,.15)':'transparent';
      Object.keys(labels).forEach(function(key){labels[key].classList.toggle('hot',key===k);labels[key].classList.toggle('dim',!!k&&key!==k);});
    }
  }
  // parallax
  par.x+=(targetPar.x-par.x)*0.04;par.y+=(targetPar.y-par.y)*0.04;
  if(!flying){worlds.rotation.y=par.x*0.12;worlds.rotation.x=-par.y*0.08;dust.rotation.x=-par.y*0.04;}
  // fly tween
  if(flying){
    flyT+=0.012;var e=easeIO(Math.min(flyT,1));
    camera.position.lerpVectors(flyFrom,flyTo,e);
    curLook.lerpVectors(lookFrom,lookTo,e);
    if(flyT>=1){flying=false;if(flyTo.equals(homeCam)){}else{backBtn.classList.add('show');}}
  }
  camera.lookAt(curLook);
  projectLabels();
  renderer.render(scene,camera);
}
loop();

// ---- hide loader when ready ----
function hideLoader(){var l=document.getElementById('ld');l.classList.add('out');setTimeout(function(){l.style.display='none';},800);}
if(document.readyState==='complete')setTimeout(hideLoader,400);else addEventListener('load',function(){setTimeout(hideLoader,400);});
setTimeout(hideLoader,3000);
})();
</script>
</body>
</html>
