<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Galaxie — benchmark 9/10 (preview)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#000;overflow:hidden;font-family:'Geist',-apple-system,sans-serif;color:#fff}
  #c{position:fixed;inset:0;display:block}
  #ld{position:fixed;inset:0;z-index:10;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;transition:opacity .8s}
  #ld.out{opacity:0;pointer-events:none}
  .r{width:48px;height:48px;border-radius:50%;border:2px solid rgba(0,224,192,.15);border-top-color:#00e0c0;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .t{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:#7a7570}
  .cap{position:fixed;left:0;right:0;bottom:1.4rem;text-align:center;z-index:5;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:#8a857e;pointer-events:none}
</style>
</head>
<body>
<div id="ld"><div class="r"></div><div class="t">Se formeaza o galaxie</div></div>
<canvas id="c"></canvas>
<div class="cap">Websites — lumi construite</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x03040a,0.012);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,400);
camera.position.set(0,16,34);
camera.lookAt(0,0,0);

// soft round sprite
function tex(){const c=document.createElement('canvas');c.width=c.height=64;const x=c.getContext('2d');
 const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.3,'rgba(255,255,255,.55)');g.addColorStop(1,'rgba(255,255,255,0)');
 x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const sprite=tex();

const galaxy=new THREE.Group();scene.add(galaxy);

// --- spiral stars ---
const N=22000, ARMS=3, SPIN=2.4, RADIUS=24;
const pos=new Float32Array(N*3), col=new Float32Array(N*3);
const cCore=new THREE.Color(0xfff2d6), cMid=new THREE.Color(0xffb86b), cArm=new THREE.Color(0x00e0c0), cEdge=new THREE.Color(0x7b5aff);
for(let i=0;i<N;i++){
  const r=Math.pow(Math.random(),0.62);
  const arm=i%ARMS;
  const ang=arm/ARMS*Math.PI*2 + r*SPIN*2.2 + (Math.random()-0.5)*0.55*(1.0-r*0.6);
  const rad=r*RADIUS + (Math.random()-0.5)*1.6;
  const y=(Math.random()-0.5)*(2.4*(1.0-r)+0.25);
  pos[i*3]=Math.cos(ang)*rad; pos[i*3+1]=y; pos[i*3+2]=Math.sin(ang)*rad;
  const c=new THREE.Color();
  if(r<0.16) c.copy(cCore).lerp(cMid,r/0.16);
  else if(r<0.55) c.copy(cMid).lerp(cArm,(r-0.16)/0.39);
  else c.copy(cArm).lerp(cEdge,(r-0.55)/0.45);
  const f=0.55+Math.random()*0.45;
  col[i*3]=c.r*f; col[i*3+1]=c.g*f; col[i*3+2]=c.b*f;
}
const g=new THREE.BufferGeometry();
g.setAttribute('position',new THREE.BufferAttribute(pos,3));
g.setAttribute('color',new THREE.BufferAttribute(col,3));
galaxy.add(new THREE.Points(g,new THREE.PointsMaterial({size:0.42,map:sprite,vertexColors:true,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.95,sizeAttenuation:true})));

// --- dense bright core (extra) ---
const NC=4000; const cp=new Float32Array(NC*3), cc=new Float32Array(NC*3);
for(let i=0;i<NC;i++){const r=Math.pow(Math.random(),1.8)*5.0;const a=Math.random()*Math.PI*2;const ph=(Math.random()-0.5)*Math.PI;
 cp[i*3]=Math.cos(a)*Math.cos(ph)*r; cp[i*3+1]=Math.sin(ph)*r*0.5; cp[i*3+2]=Math.sin(a)*Math.cos(ph)*r;
 const c=cCore.clone().lerp(cMid,Math.random()*0.5);cc[i*3]=c.r;cc[i*3+1]=c.g;cc[i*3+2]=c.b;}
const gc=new THREE.BufferGeometry();gc.setAttribute('position',new THREE.BufferAttribute(cp,3));gc.setAttribute('color',new THREE.BufferAttribute(cc,3));
galaxy.add(new THREE.Points(gc,new THREE.PointsMaterial({size:0.55,map:sprite,vertexColors:true,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:1.0,sizeAttenuation:true})));

// --- core glow sprite ---
const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:sprite,color:0xffd9a0,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.9}));
glow.scale.set(14,14,1);galaxy.add(glow);

// --- distant starfield ---
const SF=1500;const sp=new Float32Array(SF*3);
for(let i=0;i<SF;i++){const rr=70+Math.random()*120;const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
 sp[i*3]=Math.sin(ph)*Math.cos(th)*rr;sp[i*3+1]=Math.cos(ph)*rr;sp[i*3+2]=Math.sin(ph)*Math.sin(th)*rr;}
const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:0.5,map:sprite,color:0xaecfff,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:.6})));

galaxy.rotation.x=0.62;

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.9,0.6,0.18));

let tmx=0,tmy=0,mx=0,my=0;
addEventListener('mousemove',e=>{tmx=(e.clientX/innerWidth*2-1);tmy=-(e.clientY/innerHeight*2-1);});
addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});

const clock=new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  mx+=(tmx-mx)*0.04; my+=(tmy-my)*0.04;
  galaxy.rotation.y=clock.getElapsedTime()*0.04 + mx*0.3;
  galaxy.rotation.x=0.62 - my*0.18;
  const p=0.95+0.05*Math.sin(clock.getElapsedTime()*1.5);glow.scale.set(14*p,14*p,1);
  composer.render();
}
loop();
addEventListener('load',()=>setTimeout(()=>{const l=document.getElementById('ld');l.classList.add('out');setTimeout(()=>l.style.display='none',800);},600));
setTimeout(()=>{const l=document.getElementById('ld');if(l){l.classList.add('out');setTimeout(()=>l.style.display='none',800);}},3500);
</script>
</body>
</html>
