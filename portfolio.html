<script id="mobile-perf-js">
/* Aggressive mobile optimization: disable heavy scripts, pause videos */
(function(){
  var isMobile = window.matchMedia('(pointer: coarse)').matches || window.innerWidth <= 900;
  if (!isMobile) return;

  window.MOBILE_DEVICE = true;

  // Block premium-fx.js and earth-tex.js from running
  var blockedScripts = ['premium-fx.js', 'earth-tex.js', 'meteor-cursor.js'];
  var origCreateEl = document.createElement.bind(document);
  document.createElement = function(tag){
    var el = origCreateEl(tag);
    if (tag.toLowerCase() === 'script') {
      var origSetAttr = el.setAttribute.bind(el);
      el.setAttribute = function(name, val){
        if (name === 'src' && blockedScripts.some(function(s){return val.indexOf(s)>=0;})) {
          return; // silently drop
        }
        return origSetAttr(name, val);
      };
      Object.defineProperty(el, 'src', {
        set: function(v){
          if (blockedScripts.some(function(s){return v.indexOf(s)>=0;})) return;
          el.setAttribute('src', v);
        },
        get: function(){return el.getAttribute('src');}
      });
    }
    return el;
  };

  document.addEventListener('DOMContentLoaded', function(){
    // Remove meteor cursor elements
    document.querySelectorAll('[id^="meteor"], [class^="meteor"]').forEach(function(el){el.remove();});
    
    // Pause all autoplay videos
    document.querySelectorAll('video[autoplay]').forEach(function(v){
      v.pause();
      v.removeAttribute('autoplay');
      v.removeAttribute('loop');
      v.style.display = 'none';
    });

    // Disable continuous animations (requestAnimationFrame loops are the worst)
    // Find & stop typical particle/canvas animations
    document.querySelectorAll('canvas').forEach(function(c){
      var cls = c.className || '';
      if (cls.match(/particle|constellation|star|meteor|trail/i)) {
        c.style.display = 'none';
      }
    });
  });

  // Throttle scroll listeners - many sites attach expensive scroll handlers
  // Don't touch user listeners; just set passive defaults
})();

<script id="nav-auto-hide">
(function(){
  var nav=document.getElementById('nav')||document.querySelector('nav');
  if(!nav)return;
  var lastY=window.scrollY;
  var ticking=false;
  function update(){
    var cur=window.scrollY;
    if(cur<20){
      nav.classList.remove('nav-hidden');
      document.body.classList.remove('nav-hidden');
    } else if(cur>lastY+4){
      nav.classList.add('nav-hidden');
      document.body.classList.add('nav-hidden');
    } else if(cur<lastY-4){
      nav.classList.remove('nav-hidden');
      document.body.classList.remove('nav-hidden');
    }
    lastY=cur;
    ticking=false;
  }
  window.addEventListener('scroll',function(){
    if(!ticking){requestAnimationFrame(update);ticking=true;}
  },{passive:true});
})();
</script>
