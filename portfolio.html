<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=/portofoliu.html">
<link rel="canonical" href="https://i-vory.ro/portofoliu.html">
<title>Redirectare...</title>

<style id="meteor-cursor">
@media(min-width:769px){
*,a,button,input,textarea,select{cursor:none !important}
.meteor{position:fixed;pointer-events:none;z-index:99999;width:28px;height:28px;margin:-14px 0 0 -14px;transition:opacity .3s}
.meteor-core{position:absolute;width:28px;height:28px;border-radius:50% 45% 50% 25%;background:radial-gradient(circle at 35% 35%,#fff 0%,#ffd89a 20%,#ff9a3d 40%,#e0440e 65%,rgba(120,30,0,.8) 100%);box-shadow:0 0 20px 8px rgba(255,154,61,.8),0 0 50px 15px rgba(255,100,20,.4),0 0 8px 2px #fff;animation:meteorGlow 1.5s ease-in-out infinite}
.meteor-flame{position:absolute;width:45px;height:14px;top:7px;right:-32px;background:linear-gradient(90deg,rgba(255,200,100,.95),rgba(255,120,30,.7),rgba(255,60,10,.4),rgba(123,44,255,.2),transparent);border-radius:4px 20px 20px 4px;filter:blur(3px);transform-origin:left center;animation:flameFlicker .25s ease-in-out infinite alternate}
.meteor-flame2{position:absolute;width:35px;height:10px;top:10px;right:-24px;background:linear-gradient(90deg,rgba(0,224,192,.7),rgba(123,44,255,.4),rgba(240,80,180,.2),transparent);border-radius:3px 14px 14px 3px;filter:blur(4px);animation:flameFlicker .18s ease-in-out infinite alternate-reverse}
.meteor-flame3{position:absolute;width:25px;height:8px;top:12px;right:-18px;background:linear-gradient(90deg,rgba(255,255,200,.8),rgba(255,180,60,.4),transparent);border-radius:2px 10px 10px 2px;filter:blur(2px);animation:flameFlicker .3s ease-in-out infinite alternate}
#nebulaCanvas{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:99990;mix-blend-mode:screen}
@keyframes meteorGlow{0%,100%{box-shadow:0 0 20px 8px rgba(255,154,61,.8),0 0 50px 15px rgba(255,100,20,.4),0 0 8px 2px #fff}50%{box-shadow:0 0 30px 12px rgba(255,154,61,1),0 0 70px 20px rgba(255,100,20,.6),0 0 12px 4px #fff}}
@keyframes flameFlicker{0%{opacity:.9;transform:scaleX(1) scaleY(1)}100%{opacity:.6;transform:scaleX(1.4) scaleY(.7)}}
}
</style>
</head>
<body>
<p>Pagina s-a mutat. <a href="/portofoliu.html">Click aici</a>.</p>

<script id="meteor-cursor-js">
(function(){
if(window.innerWidth<=768)return;

// Meteorite element
var m=document.createElement('div');m.className='meteor';
m.innerHTML='<div class="meteor-core"></div><div class="meteor-flame"></div><div class="meteor-flame2"></div><div class="meteor-flame3"></div>';
document.body.appendChild(m);

// Nebula canvas
var cv=document.createElement('canvas');cv.id='nebulaCanvas';
document.body.appendChild(cv);
var ctx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

var mx=0,my=0,cx=0,cy=0,speed=.12;
var trail=[];
var hue=0;

document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;m.style.opacity='1'});
document.addEventListener('mouseleave',function(){m.style.opacity='0'});

// Color palette matching site
var nebColors=[
  [0,224,192],   // teal
  [123,44,255],  // purple
  [255,154,61],  // orange
  [240,80,180],  // pink
  [255,100,20],  // deep orange
  [80,120,255],  // blue
  [255,220,100], // gold
];

function tick(){
  cx+=(mx-cx)*speed;cy+=(my-cy)*speed;
  m.style.left=cx+'px';m.style.top=cy+'px';
  var dx=mx-cx,dy=my-cy,angle=Math.atan2(dy,dx)*180/Math.PI;
  var core=m.querySelector('.meteor-core');
  core.style.transform='rotate('+(angle-45)+'deg)';
  var fa='rotate('+angle+'deg)';
  m.querySelector('.meteor-flame').style.transform=fa;
  m.querySelector('.meteor-flame2').style.transform=fa;
  m.querySelector('.meteor-flame3').style.transform=fa;

  // Add trail points
  var vel=Math.sqrt(dx*dx+dy*dy);
  if(vel>1.5){
    var numP=Math.min(Math.floor(vel/3),6);
    for(var i=0;i<numP;i++){
      var col=nebColors[Math.floor(Math.random()*nebColors.length)];
      trail.push({
        x:cx+Math.random()*20-10,
        y:cy+Math.random()*20-10,
        r:Math.random()*25+8,
        vx:(Math.random()-.5)*1.5,
        vy:Math.random()*-2-0.5,
        life:1,
        decay:Math.random()*.012+.006,
        col:col,
        blur:Math.random()*15+5
      });
    }
  }

  // Draw nebula
  ctx.clearRect(0,0,cv.width,cv.height);
  for(var i=trail.length-1;i>=0;i--){
    var p=trail[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=.98;p.vy*=.98;
    p.life-=p.decay;
    p.r+=.3;
    if(p.life<=0){trail.splice(i,1);continue}

    var alpha=p.life*p.life*.6;
    var grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    grd.addColorStop(0,'rgba('+p.col[0]+','+p.col[1]+','+p.col[2]+','+alpha+')');
    grd.addColorStop(.4,'rgba('+p.col[0]+','+p.col[1]+','+p.col[2]+','+(alpha*.5)+')');
    grd.addColorStop(1,'rgba('+p.col[0]+','+p.col[1]+','+p.col[2]+',0)');
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();
  }

  // Bright core glow at cursor
  if(vel>2){
    var coreGrd=ctx.createRadialGradient(cx,cy,0,cx,cy,35);
    coreGrd.addColorStop(0,'rgba(255,220,150,.3)');
    coreGrd.addColorStop(.3,'rgba(255,154,61,.15)');
    coreGrd.addColorStop(1,'rgba(255,100,20,0)');
    ctx.beginPath();ctx.arc(cx,cy,35,0,Math.PI*2);
    ctx.fillStyle=coreGrd;ctx.fill();
  }

  // Cap trail length for performance
  if(trail.length>200)trail.splice(0,trail.length-200);

  requestAnimationFrame(tick);
}
tick();

// IMPACT on click
document.addEventListener('click',function(e){
  // Nebula burst
  for(var i=0;i<25;i++){
    var angle=Math.random()*Math.PI*2;
    var dist=Math.random()*80+20;
    var col=nebColors[Math.floor(Math.random()*nebColors.length)];
    trail.push({
      x:e.clientX,y:e.clientY,
      r:Math.random()*20+5,
      vx:Math.cos(angle)*(Math.random()*4+2),
      vy:Math.sin(angle)*(Math.random()*4+2),
      life:1,decay:.015,col:col,blur:10
    });
  }
  // White flash
  trail.push({
    x:e.clientX,y:e.clientY,r:5,vx:0,vy:0,
    life:1,decay:.04,col:[255,255,255],blur:0
  });
});

})();
</script>
</body>
</html>
