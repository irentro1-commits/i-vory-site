<script>
/* GALERIE video: schelet. Andy ataaaarna clipurile reale (thumb + link/embed) aici. */
const PROJECTS=[
  {name:"Clip vertical", tag:"Reel · Instagram", result:"Filmare scurtă pentru lansare.", thumb:"", status:"soon"},
  {name:"Clip vertical", tag:"TikTok", result:"Montaj rapid, ritm pe muzică.", thumb:"", status:"soon"},
  {name:"Clip produs", tag:"Promo", result:"Prezentare de produs în 20 sec.", thumb:"", status:"soon"}
];
const grid=document.getElementById('grid');
PROJECTS.forEach((p)=>{
  const live=p.status==='live';
  const el=document.createElement(live?'a':'div');
  el.className='card reveal'+(live?' live':'');
  if(live){el.href=p.url;el.target='_blank';el.rel='noopener';}
  const shot=p.thumb?'<img src="'+p.thumb+'" alt="'+p.name+'" loading="lazy">':'<div class="play"></div>';
  const badge=live?'':'<span class="badge">în curând</span>';
  el.innerHTML=badge+'<div class="shot">'+shot+'</div><div class="meta"><div class="tag">'+p.tag+'</div><h3>'+p.name+'</h3><p>'+p.result+'</p></div>';
  grid.appendChild(el);
});
document.getElementById('count').textContent=PROJECTS.length+' proiecte';
const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
