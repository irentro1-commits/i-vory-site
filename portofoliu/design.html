<!DOCTYPE html>
<html lang="ro">
<head>

<style>
  :root{--bg:#050505;--t:#ede9e3;--td:#d0cbc3;--tm:#8a857e;--ac:#ffce80;--pu:#7b2cff;--br:rgba(255,255,255,.08);--br2:rgba(255,255,255,.14);--fd:'Geist',-apple-system,sans-serif;--fm:'Geist Mono',ui-monospace,monospace;--fs:'Fraunces','Times New Roman',serif;--e:cubic-bezier(.16,1,.3,1)}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw}
  body{background:var(--bg);color:var(--t);font-family:var(--fd);line-height:1.6;overflow-x:hidden}
  ::selection{background:var(--ac);color:#1a1206}
  a{color:inherit;text-decoration:none}
  #bg{position:fixed;inset:0;z-index:0;display:block}
  #ov{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,rgba(5,5,5,.82) 0%,rgba(5,5,5,.45) 34%,rgba(5,5,5,0) 64%),linear-gradient(180deg,rgba(5,5,5,.30) 0%,rgba(5,5,5,.55) 42%,rgba(5,5,5,.92) 78%,#050505 100%)}
  .wrap{position:relative;z-index:2}
  .nav{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:1.15rem 1.8rem;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);background:linear-gradient(180deg,rgba(5,5,5,.55),transparent)}
  .brand{font-weight:800;font-size:1.1rem;letter-spacing:-.01em}
  .brand span{color:var(--ac)}
  .back{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--fm);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--td);padding:.5rem .9rem;border:1px solid var(--br2);border-radius:100px;transition:border-color .25s,color .25s,background .25s}
  .back:hover{color:var(--t);border-color:var(--ac);background:rgba(255,206,128,.08)}
  .hero{min-height:78vh;display:flex;flex-direction:column;justify-content:center;padding:7rem 1.8rem 3rem;max-width:1120px;margin:0 auto}
  .eyebrow{font-family:var(--fm);font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;color:var(--ac);margin-bottom:1.2rem;display:flex;align-items:center;gap:.7rem}
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--ac);opacity:.6}
  h1{font-family:var(--fs);font-weight:700;font-size:clamp(3.2rem,11vw,7rem);line-height:.92;letter-spacing:-.03em;font-variation-settings:"opsz" 144}
  .lede{font-size:clamp(1.05rem,2.4vw,1.4rem);color:var(--td);max-width:620px;margin-top:1.4rem;line-height:1.55}
  .lede b{color:var(--t);font-weight:600}
  .gallery{max-width:1120px;margin:0 auto;padding:2rem 1.8rem 5rem}
  .gh{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;margin-bottom:1.8rem;border-bottom:1px solid var(--br);padding-bottom:1rem}
  .gh h2{font-family:var(--fs);font-weight:600;font-size:clamp(1.5rem,4vw,2.1rem);letter-spacing:-.02em}
  .gh .count{font-family:var(--fm);font-size:.72rem;letter-spacing:.16em;color:var(--tm);text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(250px,100%),1fr));gap:1.4rem}
  .card{position:relative;border:1px solid var(--br);border-radius:16px;overflow:hidden;background:rgba(12,12,14,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .4s var(--e),border-color .3s,box-shadow .4s}
  .card.live{cursor:pointer}
  .card.live:hover{transform:translateY(-6px);border-color:rgba(255,206,128,.5);box-shadow:0 18px 50px rgba(0,0,0,.5),0 0 0 1px rgba(255,206,128,.15)}
  .shot{aspect-ratio:4/5;position:relative;overflow:hidden;background:radial-gradient(120% 120% at 30% 20%,rgba(255,206,128,.16),transparent 55%),radial-gradient(120% 120% at 80% 90%,rgba(255,120,80,.14),transparent 55%),#0a0a0e;display:flex;align-items:center;justify-content:center}
  .shot img{width:100%;height:100%;object-fit:cover;display:block}
  .shot .ph{font-family:var(--fs);font-weight:700;font-size:2.4rem;color:rgba(255,255,255,.10)}
  .meta{padding:1.05rem 1.1rem 1.2rem}
  .meta .tag{font-family:var(--fm);font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ac);margin-bottom:.45rem}
  .meta h3{font-family:var(--fs);font-weight:600;font-size:1.2rem;letter-spacing:-.01em;margin-bottom:.35rem}
  .meta p{font-size:.84rem;color:var(--td);line-height:1.5}
  .badge{position:absolute;top:.8rem;right:.8rem;z-index:3;font-family:var(--fm);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--td);background:rgba(5,5,5,.7);border:1px solid var(--br2);padding:.3rem .6rem;border-radius:100px}
  .cta{max-width:1120px;margin:0 auto;padding:1rem 1.8rem 7rem;text-align:center}
  .cta h2{font-family:var(--fs);font-weight:700;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:-.02em;line-height:1.05}
  .cta p{color:var(--td);margin-top:.9rem;font-size:1.05rem}
  .btn{display:inline-flex;align-items:center;gap:.6rem;margin-top:1.8rem;padding:1rem 1.8rem;background:linear-gradient(135deg,#ffce80,#ff9650);color:#1a1206;font-weight:700;border-radius:100px;box-shadow:0 12px 34px rgba(255,150,80,.26);transition:transform .25s}
  .btn:hover{transform:translateY(-2px)}
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s var(--e),transform .7s var(--e)}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
  @media (max-width:560px){.nav{padding:1rem 1.2rem}.hero{padding:6rem 1.2rem 2rem}.gallery,.cta{padding-left:1.2rem;padding-right:1.2rem}}
  html.mob #bg{display:none}
  html.mob body{background:radial-gradient(130% 95% at 72% 12%,rgba(255,206,128,.14),transparent 58%),radial-gradient(110% 85% at 18% 92%,rgba(123,90,255,.10),transparent 60%),#050505}

<body>
<canvas id="bg"></canvas>
<div id="ov"></div>
<header class="nav">
  <a class="brand" href="/">i<span>-</span>vory</a>
  <a class="back" href="/portofoliu-hub.html">&larr; Portofoliu</a>
</header>
<div class="wrap">
  <section class="hero">
    <div class="eyebrow reveal">Portofoliu</div>
    <h1 class="reveal">Design</h1>
    <p class="lede reveal">Carusele &#537;i grafic&#259; ce <b>opresc degetul pe ecran</b>. Imagini g&#226;ndite s&#259; spun&#259; ceva, nu doar s&#259; arate bine.</p>
  </section>
  <section class="gallery">
    <div class="gh reveal"><h2>Lucr&#259;ri de design</h2><span class="count" id="count"></span></div>
    <div class="grid" id="grid"></div>
  </section>
  <section class="cta reveal">
    <h2>Vrei design care te face remarcat?</h2>
    <p>Spune-ne ce vinzi &#537;i &#238;&#539;i ar&#259;t&#259;m cum ar ar&#259;ta.</p>
    <a class="btn" href="/servicii.html">Cere o ofert&#259;
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
  </section>
</div>
<script>window.__MOB=(matchMedia('(max-width:820px)').matches||('ontouchstart' in window && innerWidth<900)||location.search.indexOf('forcemob')>-1);if(window.__MOB)document.documentElement.classList.add('mob');</script>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
if(!window.__MOB){
const THREE = await import('three');
const {EffectComposer} = await import('three/addons/postprocessing/EffectComposer.js');
const {RenderPass} = await import('three/addons/postprocessing/RenderPass.js');
const {UnrealBloomPass} = await import('three/addons/postprocessing/UnrealBloomPass.js');
const canvas=document.getElementById('bg');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.7;
const scene=new THREE.Scene();
const cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const uniforms={uTime:{value:0},uRes:{value:new THREE.Vector2(innerWidth,innerHeight)}};
const frag=`
precision highp float;
uniform float uTime; uniform vec2 uRes;
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise(vec3 x){vec3 i=floor(x),f=fract(x);f=f*f*(3.0-2.0*f);
 return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
            mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
float fbm(vec3 p){float s=0.0,a=0.5;for(int i=0;i<5;i++){s+=a*noise(p);p*=2.13;a*=0.5;}return s;}
vec3 temp(float t){vec3 a=vec3(1.0,0.42,0.10),b=vec3(1.0,0.78,0.34),c=vec3(1.0,0.97,0.92);
 return t<0.5?mix(a,b,t*2.0):mix(b,c,(t-0.5)*2.0);}
void main(){
 vec2 uv=(gl_FragCoord.xy-0.5*uRes)/uRes.y;
 uv.x-=0.42;
 float r=length(uv);
 float pulse=0.93+0.07*sin(uTime*1.4)+0.02*sin(uTime*3.7);
 float Rs=0.22*pulse;
 vec3 col=vec3(0.0);
 if(r<Rs){
  float z=sqrt(max(Rs*Rs-r*r,0.0));
  vec3 n=normalize(vec3(uv,z));
  float pl=fbm(n*3.6+vec3(uTime*0.22,uTime*0.1,-uTime*0.15));
  pl=pow(clamp(pl+0.28,0.0,1.0),1.4);
  float fres=pow(1.0-z/Rs,1.6);
  col=temp(pl)*(0.7+pl*0.8)+temp(1.0)*fres*0.5;
 } else {
  float fall=Rs/r, ang=atan(uv.y,uv.x);
  float fil=fbm(vec3(cos(ang)*3.0,sin(ang)*3.0,uTime*0.13));
  float rays=pow(0.5+0.5*sin(ang*13.0+fil*7.0),3.0);
  float glow=pow(fall,2.1)*(0.55+0.7*fil)+pow(fall,3.6)*rays*0.8;
  col=temp(0.32)*glow;
  col+=vec3(0.0,0.55,0.5)*pow(fall,1.25)*pow(fil,3.2)*0.5;
 }
 float sw=mod(uTime*0.16,1.0);
 float ringR=0.22+sw*1.4;
 col+=temp(0.65)*smoothstep(0.05,0.0,abs(r-ringR))*(1.0-sw)*0.4;
 float st=hash(vec3(floor(uv*270.0+50.0),7.0)); if(st>0.993)col+=vec3((st-0.993)/0.007)*0.5;
 gl_FragColor=vec4(col,1.0);
}`;
const quad=new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.ShaderMaterial({uniforms,vertexShader:`void main(){gl_Position=vec4(position.xy,0.0,1.0);}`,fragmentShader:frag,depthTest:false,depthWrite:false}));
scene.add(quad);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,cam));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.6,0.55,0.55));
addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);uniforms.uRes.value.set(innerWidth,innerHeight);});
const clock=new THREE.Clock();
function loop(){requestAnimationFrame(loop);uniforms.uTime.value=clock.getElapsedTime();composer.render();}
loop();
} /* desktop bg */
</script>
<script>
/* GALERIE design: schelet. Andy ataaaarna caruselele reale (thumb + nume) aici. */
const PROJECTS=[
  {name:"Proiect carusel", tag:"Carusel · Instagram", result:"Set de imagini pentru o campanie.", thumb:"", status:"soon"},
  {name:"Proiect carusel", tag:"Carusel · TikTok", result:"Grafică pentru o serie de postări.", thumb:"", status:"soon"},
  {name:"Proiect grafică", tag:"Identitate vizuală", result:"Elemente de brand și șabloane.", thumb:"", status:"soon"},
  {name:"Proiect carusel", tag:"Carusel · educativ", result:"Explicație pas cu pas în imagini.", thumb:"", status:"soon"}
];
const grid=document.getElementById('grid');
PROJECTS.forEach((p,idx)=>{
  const live=p.status==='live';
  const el=document.createElement('div');
  el.className='card reveal'+(live?' live':'');
  const num=String(idx+1).padStart(2,'0');
  const shot=p.thumb?'<img src="'+p.thumb+'" alt="'+p.name+'" loading="lazy">':'<span class="ph">'+num+'</span>';
  const badge=live?'':'<span class="badge">în curând</span>';
  el.innerHTML=badge+'<div class="shot">'+shot+'</div><div class="meta"><div class="tag">'+p.tag+'</div><h3>'+p.name+'</h3><p>'+p.result+'</p></div>';
  grid.appendChild(el);
});
document.getElementById('count').textContent=PROJECTS.length+' proiecte';
const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
