  function loop(){gl.clear(gl.COLOR_BUFFER_BIT);gl.uniform1f(uT,(performance.now()-t0)/1000);gl.uniform2f(uR,cv.width,cv.height);gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(loop);}
  loop();
})();}
</script>

<script>
/* ---- GALERIE: schelet data-driven. Andy ataaaarna tablourile (thumb + url real) aici. ---- */
/* BASE = standardul premium i-vory, IDENTIC pe orice site (aceeasi ordine = se aliniaza intre carduri). specific = ce e unic. */
const BASE=["Design premium custom","Rapid pe telefon (mobile-first)","Core Web Vitals verzi","SEO + AEO (Google + AI)"];
const PROJECTS=[
  {name:"UrbanCat", tag:"Magazin online premium · Shopify", url:"https://urbancat.ro", urlLabel:"urbancat.ro", case:"/portofoliu/client/urbancat.html",
   result:"Magazin premium pentru pisici de apartament.", thumb:"/portofoliu/img/urbancat.jpg?v=1",
   base:BASE, spec:["Magazin Shopify complet","Catalog + blog + multilingv"], price:"de la 5.000 lei", status:"live"},
  {name:"i-vory Studio", tag:"Site prezentare premium", url:"https://i-vory.ro", urlLabel:"i-vory.ro", case:"/portofoliu/proiect/ivory.html",
   result:"Hero 3D, animații cinematice, încarcă instant.", thumb:"/portofoliu/img/ivory.jpg?v=1",
   base:BASE, spec:["Hero 3D + animații cinematice","Site multi-pagină"], price:"de la 2.500 lei", status:"live"}
];

const grid=document.getElementById('grid');
const ICON='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
PROJECTS.forEach(p=>{
  const live=p.status==='live';
  const hasCase=!!p.case;
  const hasClient=!!p.client;
  const el=document.createElement((live&&!hasClient)?'a':'div');
  el.className='card reveal'+(live?' live':'');
  if(live&&!hasClient){ if(hasCase){el.href=p.case;} else {el.href=p.url;el.target='_blank';el.rel='noopener';} }
  const initial=p.name.trim().charAt(0).toUpperCase();
  const shotImg = p.thumb ? '<img src="'+p.thumb+'" alt="'+p.name+'" loading="lazy">' : '<span class="ph">'+initial+'</span>';
  const head='<div class="chrome"><i></i><i></i><i></i><span class="url">'+p.urlLabel+'</span></div><div class="shot">'+shotImg+'</div>';
  const top = hasClient ? '<a class="shotlink" href="'+p.case+'">'+head+'</a>' : head;
  const badge = live ? '' : '<span class="badge">în curând</span>';
  const baseHtml=(p.base||[]).map(function(x){return '<span>'+x+'</span>';}).join('');
  const specHtml=(p.spec||[]).map(function(x){return '<span class="spec">'+x+'</span>';}).join('');
  const feats=(baseHtml||specHtml)?'<div class="feat">'+baseHtml+specHtml+'</div>':'';
  const price=p.price?'<div class="price">'+p.price+'</div>':'';
  let cta='';
  if(hasClient){
    cta='<div class="go2"><a class="go" href="'+p.case+'">Vezi site '+ICON+'</a><a class="go gohi" href="'+p.client+'">Vezi tot clientul '+ICON+'</a></div>';
  } else if(live){
    cta='<span class="go">'+(hasCase?'Vezi proiectul':'Vezi site')+' '+ICON+'</span>';
  }
  el.innerHTML = badge + top +
    '<div class="meta"><div class="tag">'+p.tag+'</div><h3>'+p.name+'</h3><p>'+p.result+'</p>'+feats+price+cta+'</div>';
  grid.appendChild(el);
});
document.getElementById('count').textContent=PROJECTS.length+' proiecte';

/* reveal on scroll */
const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.12});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
