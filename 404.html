<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Pagina nu există | i-Vory</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#ede9e3;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-family:'Syne',sans-serif;font-size:clamp(4rem,15vw,10rem);font-weight:800;letter-spacing:-.06em;color:#00e0c0;line-height:1}
p{font-size:1rem;color:#9e9890;margin:1rem 0 2rem;max-width:400px}
a{display:inline-block;background:#00e0c0;color:#050505;padding:.8rem 2rem;border-radius:100px;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;text-decoration:none;transition:transform .3s,box-shadow .3s}
a:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,224,192,.25)}
</style>
<style>
.ft-wrap{position:relative;z-index:2;margin-top:6rem;background:linear-gradient(180deg,rgba(4,6,14,0) 0%,rgba(6,8,18,.95) 20%,rgba(4,6,14,1) 100%);border-top:1px solid rgba(0,224,192,.15);padding:4rem 2rem 2rem;font-family:var(--fb,DM Sans),sans-serif}
.ft-inner{max-width:1200px;margin:0 auto}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.3fr;gap:3rem;margin-bottom:3rem}
.ft-brand .ft-logo img{height:52px;filter:drop-shadow(0 0 16px rgba(0,224,192,.5));margin-bottom:1.2rem}
.ft-tag{color:#a8b5c0;font-size:.85rem;line-height:1.65;max-width:340px;margin-bottom:1.5rem}
.ft-social{display:flex;gap:.7rem}
.ft-social a{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#a8b5c0;transition:all .3s;text-decoration:none}
.ft-social a:hover{background:rgba(0,224,192,.15);border-color:#00e0c0;color:#00e0c0;transform:translateY(-2px)}
.ft-col h4{font-family:var(--fd,Syne),sans-serif;font-size:.82rem;font-weight:800;color:#fff5e6;text-transform:uppercase;letter-spacing:.15em;margin:0 0 1.2rem}
.ft-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:.7rem}
.ft-col li{font-size:.85rem;color:#a8b5c0}
.ft-col a{color:#a8b5c0;text-decoration:none;transition:color .25s;font-size:.85rem}
.ft-col a:hover{color:#00e0c0}
.ft-contact li{color:#a8b5c0;font-size:.85rem}
.ft-cta{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.2rem;padding:.7rem 1.2rem;background:linear-gradient(135deg,#ff9a3d,#ffb86b);color:#1a0a00 !important;border-radius:100px;font-family:var(--fd,Syne),sans-serif;font-weight:800;font-size:.78rem;text-decoration:none;transition:all .3s;box-shadow:0 8px 20px rgba(255,154,61,.25)}
.ft-cta:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(255,154,61,.4);color:#1a0a00 !important}
.ft-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:2rem;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap;gap:1rem}
.ft-legal{display:flex;flex-direction:column;gap:.3rem;font-size:.72rem;color:#5a6572}
.ft-links{display:flex;gap:1.5rem}
.ft-links a{color:#5a6572;font-size:.75rem;text-decoration:none;transition:color .25s}
.ft-links a:hover{color:#00e0c0}
@media(max-width:900px){.ft-wrap{padding:3rem 1.2rem 1.5rem;margin-top:3rem}.ft-grid{grid-template-columns:1fr;gap:2.2rem}.ft-brand .ft-logo img{height:42px}.ft-bottom{flex-direction:column;text-align:center;align-items:center}.ft-legal{align-items:center}}
</style></head>
<body>
<h1>404</h1>
<p>Pagina pe care o cauți nu există. Poate s-a mutat, poate nu a existat niciodată.</p>
<a href="/">Înapoi la i-Vory</a>
</body>
</html>
