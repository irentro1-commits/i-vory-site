<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#000}#c{display:block;margin:0 auto}</style></head>
<body><canvas id="c" width="720" height="720"></canvas>
<script>
const cv=document.getElementById('c');const gl=cv.getContext('webgl');
const VS='attribute vec2 p;varying vec2 vUv;void main(){vUv=p*0.5+0.5;gl_Position=vec4(p,0.0,1.0);}';
const FS=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uHover;uniform float uFade;
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise(vec3 x){vec3 i=floor(x);vec3 f=fract(x);f=f*f*(3.0-2.0*f);
 return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
            mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
float fbm(vec3 p){float v=0.0,a=0.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}
vec3 temp(float t){vec3 a=vec3(1.0,0.42,0.10),b=vec3(1.0,0.78,0.34),c=vec3(1.0,0.97,0.92);return t<0.5?mix(a,b,t*2.0):mix(b,c,(t-0.5)*2.0);}
vec3 starfield(vec3 d){vec3 col=vec3(0.0);float n=hash(floor(d*260.0));
 if(n>0.987){float b=(n-0.987)/0.013;col+=vec3(b*b)*(0.4+0.6*hash(floor(d*131.0)+7.7));}
 float nb=fbm(d*2.4+vec3(0.0,0.0,uTime*0.01));
 col+=mix(vec3(0.0,0.045,0.05),vec3(0.05,0.015,0.09),nb)*0.55;
 col+=vec3(0.0,0.20,0.18)*pow(nb,3.0)*0.5;return col;}
void main(){
 vec2 uv=(vUv-0.5)*2.0;
 float my=0.17, mx=uTime*0.04;
 float cd=13.0;
 vec3 ro=vec3(sin(mx)*cos(my),sin(my),cos(mx)*cos(my))*cd;
 vec3 f=normalize(-ro), rr=normalize(cross(vec3(0.0,1.0,0.0),f)), u=cross(f,rr);
 vec3 rd=normalize(uv.x*rr*0.92+uv.y*u*0.92+1.7*f);
 vec3 pos=ro, vel=rd;
 float HOR=0.5, rin=HOR*2.5, rout=HOR*12.0;
 vec3 acc=vec3(0.0); float tr=1.0; bool hit=false; float md=99.0;
 for(int i=0;i<150;i++){
  float r=length(pos); md=min(md,r);
  if(r<HOR){hit=true;break;}
  if(r>22.0)break;
  vec3 g=-pos/(r*r*r)*0.9;
  float st=0.05+0.028*r;
  vec3 np=pos+vel*st; vel=normalize(vel+g*st);
  if(pos.y*np.y<0.0){
   float tt=pos.y/(pos.y-np.y); vec3 hp=mix(pos,np,tt); float rad=length(hp.xz);
   if(rad>rin&&rad<rout){
    float tn=(rad-rin)/(rout-rin);
    float ang=atan(hp.z,hp.x);
    float tb=fbm(vec3(rad*1.5,ang*2.0+uTime*0.5,uTime*0.2)); tb=0.5+0.7*tb;
    float rb=pow(1.0-tn,1.7)*smoothstep(0.0,0.06,tn);
    vec3 orb=normalize(vec3(-hp.z,0.0,hp.x));
    float dop=pow(0.6+0.85*clamp(dot(orb,-vel),0.0,1.0),2.2);
    acc+=temp(clamp(1.0-tn*0.8,0.0,1.0))*rb*tb*dop*3.2*tr;
    tr*=0.74;
   }
  }
  pos=np; if(tr<0.02)break;
 }
 float ring=smoothstep(HOR*1.7,HOR*1.04,md)*step(HOR,md); ring*=ring;
 vec3 bg = hit ? vec3(0.0) : starfield(normalize(vel))*tr;
 vec3 col = (bg + acc + temp(0.95)*ring*2.0)*(1.0+uHover*0.4);
 float fe=smoothstep(1.2,0.72,length(uv));
 gl_FragColor=vec4(col, fe*uFade);
}`;
function sh(t,src){const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))document.title='ERR:'+gl.getShaderInfoLog(s);return s;}
const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,VS));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,FS));gl.linkProgram(pr);gl.useProgram(pr);
const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const lp=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(lp);gl.vertexAttribPointer(lp,2,gl.FLOAT,false,0,0);
const uT=gl.getUniformLocation(pr,'uTime'),uH=gl.getUniformLocation(pr,'uHover'),uF=gl.getUniformLocation(pr,'uFade');
gl.uniform1f(uH,0.0);gl.uniform1f(uF,1.0);
let t0=performance.now();function loop(){gl.uniform1f(uT,(performance.now()-t0)/1000.0);gl.drawArrays(gl.TRIANGLES,0,3);requestAnimationFrame(loop);}loop();
</script></body></html>
